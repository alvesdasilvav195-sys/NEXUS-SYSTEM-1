<style>
  :root{
    --bg:#F6F4EE;
    --surface:#FFFFFF;
    --ink:#1C2321;
    --ink-soft:#5E675F;
    --ink-faint:#8B9289;
    --line:#E1DDD1;
    --line-strong:#CFC9B8;
    --accent:#1F6F50;
    --accent-soft:#E6F1EC;
    --accent-dark:#154B36;
    --danger:#A8402A;
    --danger-soft:#F7E9E4;
    --warn:#9C7A0E;
    --warn-soft:#FBF1DA;
    --radius:10px;
    --sidebar-w:230px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .num, input, select, td.num, .money{ font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums; }
  h1,h2,h3,.display{ font-family:'Fraunces',serif; font-weight:600; letter-spacing:-0.01em;}
  .app{ display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar{
    width:var(--sidebar-w); flex-shrink:0; background:var(--ink); color:#EFEBE0;
    padding:22px 16px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:center; gap:10px; padding:4px 8px 22px 8px; }
  .brand-mark{ width:30px; height:30px; border-radius:7px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:#fff; flex-shrink:0; }
  .brand-name{ font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; line-height:1.15;}
  .brand-sub{ font-size:10.5px; color:#B7C2B8; letter-spacing:.06em; text-transform:uppercase; margin-top:2px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
    color:#CFD6CB; font-size:13.5px; cursor:pointer; border:none; background:transparent;
    text-align:left; width:100%; font-family:inherit;
  }
  .nav-item:hover{ background:rgba(255,255,255,.06); color:#fff; }
  .nav-item.active{ background:var(--accent); color:#fff; }
  .nav-dot{ width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.55; flex-shrink:0;}
  .nav-item.active .nav-dot{ opacity:1;}
  .nav-group-head{
    display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 10px; border-radius:8px;
    color:#CFD6CB; font-size:13.5px; cursor:pointer; border:none; background:transparent; width:100%; font-family:inherit;
  }
  .nav-group-head:hover{ background:rgba(255,255,255,.06); color:#fff; }
  .nav-group-head .chev{ transition:transform .15s ease; opacity:.6; font-size:11px; }

  .nav-group-items{ padding-left:14px; display:flex; flex-direction:column; gap:2px; margin-bottom:2px; }

  .sidebar-foot{ margin-top:auto; padding:10px 8px; font-size:11px; color:#8E9A8E; border-top:1px solid rgba(255,255,255,.09); padding-top:14px;}

  /* Main */

  .topline{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:26px; flex-wrap:wrap; gap:10px;}
  .topline h1{ font-size:25px; margin:0; }
  .topline .sub{ color:var(--ink-soft); font-size:13px; margin-top:3px;}
  .today{ font-size:12.5px; color:var(--ink-faint); }

  /* Cards / tables */
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin-bottom:18px;}
  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap;}
  .card-head h2{ font-size:15.5px; margin:0; }
  .card-head .hint{ font-size:12px; color:var(--ink-faint); }

  .kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px;}

  table{ width:100%; border-collapse:collapse; font-size:13px;}
  .table-wrap{ overflow-x:auto; margin:0 -2px; }
  .table-wrap table{ min-width:820px; }
  .acoes-compactas{ display:flex; gap:2px; flex-wrap:nowrap; }

  .menu-acoes[open] > summary{ background:var(--bg); border-color:var(--ink-faint); }
  .menu-acoes .menu-lista{ position:absolute; right:0; top:calc(100% + 4px); background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,.10); min-width:190px; z-index:30; padding:5px; display:flex; flex-direction:column; }

  .menu-acoes .menu-lista button:hover{ background:var(--bg); }
  .menu-acoes .menu-lista button.danger{ color:var(--danger); }
  .menu-acoes .menu-lista .menu-info{ padding:6px 10px; font-size:11px; color:var(--ink-faint); }

  td{ padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:last-child td{ border-bottom:none;}
  td.num, th.num{ text-align:right;}
  tbody tr:hover{ background:var(--bg); }
  .muted{ color:var(--ink-faint); }
  .pos{ color:var(--accent-dark); } .neg{ color:var(--danger); }

  .pill{ display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:500; }
  .pill.green{ background:var(--accent-soft); color:var(--accent-dark);}
  .pill.red{ background:var(--danger-soft); color:var(--danger);}
  .pill.amber{ background:var(--warn-soft); color:var(--warn);}
  .pill.gray{ background:var(--bg); color:var(--ink-soft); border:1px solid var(--line);}

  input, select{
    font-family:'Inter',sans-serif; font-size:13px; padding:8px 10px; border:1px solid var(--line-strong);
    border-radius:8px; background:#fff; color:var(--ink); width:100%;

  label{ font-size:11.5px; color:var(--ink-soft); display:block; margin-bottom:4px; }
  .field{ margin-bottom:0; }
  .form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; align-items:end; margin-bottom:14px;}
  button{ font-family:'Inter',sans-serif; cursor:pointer; }
  .btn{ padding:9px 16px; border-radius:8px; border:1px solid var(--line-strong); background:#fff; font-size:13px; font-weight:500; color:var(--ink); }
  .btn:hover{ border-color:var(--ink-faint); }
  .btn-primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover{ background:var(--accent-dark); border-color:var(--accent-dark); }
  .btn-danger-ghost{ background:transparent; border:none; color:var(--danger); font-size:12px; padding:4px 6px; }
  .btn-ghost{ background:transparent; border:none; color:var(--ink-soft); font-size:12px; padding:4px 6px; }
  .btn-ghost:hover, .btn-danger-ghost:hover{ text-decoration:underline;}
  select#extratoConta, select#dreMes, select#dreAno{ width:auto; display:inline-block; }

  .empty{ text-align:center; padding:36px 10px; color:var(--ink-faint); font-size:13px; }
  .dre-line{ display:flex; justify-content:space-between; padding:7px 2px; border-bottom:1px solid var(--line); font-size:13.5px;}
  .dre-line.total{ font-weight:600; border-bottom:2px solid var(--ink); border-top:1px solid var(--line-strong); margin-top:4px; }
  .dre-line.sub{ padding-left:14px; color:var(--ink-soft); font-size:12.5px; }
  .dre-line .lbl{ display:flex; align-items:center; gap:6px;}
  .dre-section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin:16px 0 4px; }

  .badge-count{ background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:1px 8px; font-size:11px; color:var(--ink-soft);}

  ::placeholder{ color:var(--ink-faint); opacity:1;}
  @media (max-width:900px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto; padding:14px; }
    .sidebar-foot{ display:none; }
    .brand{ padding:0 12px 0 0; }
    .main{ padding:20px; }
  }
</style>

<script>
/* ---------------- Utilidades ---------------- */
const fmtMoney = v => (v<0?'-':'') + 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => { if(!d) return ''; const [y,m,day]=d.split('-'); return day+'/'+m+'/'+y; };
const todayISO = () => new Date().toISOString().slice(0,10);
const uid = () => Math.random().toString(36).slice(2,10);
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

const GRUPOS_DRE_OPCOES = [
  {id:'receita', label:'Receita de serviços (receita bruta)'},
  {id:'deducao', label:'Dedução / imposto sobre serviços'},
  {id:'custo', label:'Custo dos serviços prestados'},
  {id:'pessoal', label:'Despesa operacional — Pessoal'},
  {id:'admin', label:'Despesa operacional — Administrativa'},
  {id:'comercial', label:'Despesa operacional — Comercial / marketing'},
  {id:'fin_receita', label:'Receita financeira'},
  {id:'fin_despesa', label:'Despesa financeira'},
  {id:'outras_receitas', label:'Outra receita'},
  {id:'outras_despesas', label:'Outra despesa'},
  {id:'neutro', label:'Não entra na DRE (ex: transferência, ajuste)'}
];
const CATEGORIAS_PADRAO = [
  {id:'receita_servicos', label:'Receita de serviços', grupo:'receita'},
  {id:'deducoes', label:'Impostos sobre serviços (ISS, PIS, COFINS...)', grupo:'deducao'},
  {id:'custo_servicos', label:'Custo dos serviços prestados', grupo:'custo'},
  {id:'desp_pessoal', label:'Despesas com pessoal', grupo:'pessoal'},
  {id:'desp_admin', label:'Despesas administrativas', grupo:'admin'},
  {id:'desp_comercial', label:'Despesas comerciais / marketing', grupo:'comercial'},
  {id:'receita_financeira', label:'Receitas financeiras', grupo:'fin_receita'},
  {id:'desp_financeira', label:'Despesas financeiras (juros, tarifas)', grupo:'fin_despesa'},
  {id:'outras_receitas', label:'Outras receitas', grupo:'outras_receitas'},
  {id:'outras_despesas', label:'Outras despesas', grupo:'outras_despesas'},
  {id:'transferencia', label:'Transferência entre contas (não entra na DRE)', grupo:'neutro'},
  {id:'ajuste_saldo', label:'Correção de saldo (não entra na DRE)', grupo:'neutro'},
];
function categoriasAtuais(){ return (state.categoriasDre && state.categoriasDre.length) ? state.categoriasDre : CATEGORIAS_PADRAO; }
const catLabel = id => (categoriasAtuais().find(c=>c.id===id)||{}).label || id;


/* ---------------- Pix (BR Code) ---------------- */
function pixEMV(id, valor){ return id + String(valor.length).padStart(2,'0') + valor; }
function removerAcentos(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function crc16(payload){
  let crc = 0xFFFF;
  for(let i=0;i<payload.length;i++){
    crc ^= (payload.charCodeAt(i) << 8);
    for(let j=0;j<8;j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function gerarPayloadPix(chave, valor, nome, cidade, txid){
  const nomeUp = removerAcentos(nome||'Recebedor').toUpperCase().slice(0,25) || 'RECEBEDOR';
  const cidadeUp = removerAcentos(cidade||'BRASIL').toUpperCase().slice(0,15) || 'BRASIL';
  const txidLimpo = (txid||'***').replace(/[^A-Za-z0-9*]/g,'').slice(0,25) || '***';
  const gui = pixEMV('00','br.gov.bcb.pix');
  const chaveCampo = pixEMV('01', chave);
  const merchantAccount = pixEMV('26', gui + chaveCampo);
  const valorStr = valor && valor>0 ? valor.toFixed(2) : '';
  let payload =
    pixEMV('00','01') +
    merchantAccount +
    pixEMV('52','0000') +
    pixEMV('53','986') +
    (valorStr ? pixEMV('54', valorStr) : '') +
    pixEMV('58','BR') +
    pixEMV('59', nomeUp) +
    pixEMV('60', cidadeUp) +
    pixEMV('62', pixEMV('05', txidLimpo));
  payload += '6304';
  const crc = crc16(payload);
  return payload + crc;
}
function gerarQrPixDataURL(chave, valor, nome, cidade, txid){
  return new Promise((resolve)=>{
    if(!chave || typeof QRCode==='undefined'){ resolve(null); return; }
    try{
      const temp = document.createElement('div');
      temp.style.position = 'fixed';
      temp.style.left = '-9999px';
      document.body.appendChild(temp);
      const payload = gerarPayloadPix(chave, valor, nome, cidade, txid);
      new QRCode(temp, { text: payload, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
      setTimeout(()=>{
        const canvas = temp.querySelector('canvas');
        const dataUrl = canvas ? canvas.toDataURL('image/png') : null;
        document.body.removeChild(temp);
        resolve(dataUrl);
      }, 60);
    }catch(e){ console.error('Erro ao gerar QR Pix', e); resolve(null); }
  });
}

  janela.document.write(`

/* ---------------- Estado + persistência ---------------- */
let state = {
  empresa: { nome:'Minha Empresa' },
  contas: [],
  transacoes: [],
  notas: [],
  plano: [],
  clientes: [],
  contasPagar: [],
  contasReceber: [],
  fornecedores: [],
  agenda: [],
  crm: [],
  faturas: [],
  proLabore: [],
  cartoes: [],
  cartaoLancamentos: [],
  emprestimos: [],
  categoriasDre: [],
  configNotificacoes: { ativo:false, email:'', diasAntecedencia:3 }
};

function planoPadrao(){
  return [
    {id:uid(), grupo:'Ativo', conta:'Caixa', natureza:'D', saldoManual:0, auto:'caixa'},
    {id:uid(), grupo:'Ativo', conta:'Bancos - conta movimento', natureza:'D', saldoManual:0, auto:'bancos'},
    {id:uid(), grupo:'Ativo', conta:'Contas a receber de clientes', natureza:'D', saldoManual:0},
    {id:uid(), grupo:'Ativo', conta:'Imobilizado', natureza:'D', saldoManual:0},
    {id:uid(), grupo:'Passivo', conta:'Fornecedores a pagar', natureza:'C', saldoManual:0},
    {id:uid(), grupo:'Passivo', conta:'Impostos a recolher', natureza:'C', saldoManual:0},
    {id:uid(), grupo:'Patrimônio Líquido', conta:'Capital social', natureza:'C', saldoManual:0},
    {id:uid(), grupo:'Patrimônio Líquido', conta:'Lucros/Prejuízos acumulados', natureza:'C', saldoManual:0},
    {id:uid(), grupo:'Resultado', conta:'Receitas do período', natureza:'C', saldoManual:0, auto:'receitas'},
    {id:uid(), grupo:'Resultado', conta:'Despesas e custos do período', natureza:'D', saldoManual:0, auto:'despesas'},
  ];
}

async function loadState(){
  try{
    const r = await fetch('/api/data', {credentials:'same-origin'});
    if(r.ok){
      const parsed = await r.json();
      state = Object.assign(state, parsed);
    }
  }catch(e){
    console.error('Falha ao carregar dados do servidor', e);
  }
  if(!state.plano || state.plano.length===0) state.plano = planoPadrao();
  if(!state.clientes) state.clientes = [];
  if(!state.contasPagar) state.contasPagar = [];
  if(!state.contasReceber) state.contasReceber = [];
  if(!state.fornecedores) state.fornecedores = [];
  state.fornecedores.forEach(f=>{ if(!f.tipo) f.tipo = 'ambos'; });
  if(!state.agenda) state.agenda = [];
  if(!state.crm) state.crm = [];
  if(!state.faturas) state.faturas = [];
  if(!state.proLabore) state.proLabore = [];
  if(!state.cartoes) state.cartoes = [];
  if(!state.cartaoLancamentos) state.cartaoLancamentos = [];
  if(!state.emprestimos) state.emprestimos = [];
  if(!state.categoriasDre || state.categoriasDre.length===0) state.categoriasDre = JSON.parse(JSON.stringify(CATEGORIAS_PADRAO));
  if(!state.configNotificacoes) state.configNotificacoes = { ativo:false, email:'', diasAntecedencia:3 };
}

let saveTimer=null;
let salvando = false;
function marcarSalvando(ativo){
  salvando = ativo;
  const el = document.getElementById('statusSalvamento');
  if(el) el.textContent = ativo ? 'Salvando...' : 'Salvo no servidor';
}
function saveState(){
  return new Promise((resolve)=>{
    clearTimeout(saveTimer);
    marcarSalvando(true);
    saveTimer = setTimeout(async ()=>{
      try{
        await fetch('/api/data', {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          credentials:'same-origin',
          body: JSON.stringify(state)
        });
      }catch(e){ console.error('Falha ao salvar', e); }
      marcarSalvando(false);
      resolve();
    }, 400);
  });
}

/* ---------------- Cálculos ---------------- */
function saldoConta(contaId){
  const conta = state.contas.find(c=>c.id===contaId);
  if(!conta) return 0;
  const mov = state.transacoes.filter(t=>t.contaId===contaId)
    .reduce((s,t)=> s + (t.tipo==='credito'? t.valor : -t.valor), 0);
  return (conta.saldoInicial||0) + mov;
}
function saldoTotalContas(){
  return state.contas.reduce((s,c)=> s + saldoConta(c.id), 0);
}
function transacoesDoMes(mes, ano){
  return state.transacoes.filter(t=>{
    const d = new Date(t.data+'T00:00:00');
    return d.getMonth()===mes && d.getFullYear()===ano;
  });
}
function somaCategoria(txs, catIds){
  return txs.filter(t=>catIds.includes(t.categoria))
    .reduce((s,t)=> s + (t.tipo==='credito'? t.valor : -t.valor), 0);
}
function idsPorGrupo(grupo){ return categoriasAtuais().filter(c=>c.grupo===grupo).map(c=>c.id); }
function calcularDRE(mes, ano){
  const txs = transacoesDoMes(mes, ano);
  const receitaBruta = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='credito'), idsPorGrupo('receita')));
  const deducoes = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('deducao')));
  const receitaLiquida = receitaBruta - deducoes;
  const custoServicos = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('custo')));
  const lucroBruto = receitaLiquida - custoServicos;
  const despPessoal = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('pessoal')));
  const despAdmin = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('admin')));
  const despComercial = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('comercial')));
  const despOperacionais = despPessoal+despAdmin+despComercial;
  const resultadoOperacional = lucroBruto - despOperacionais;
  const receitaFin = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='credito'), idsPorGrupo('fin_receita')));
  const despFin = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('fin_despesa')));
  const resultadoFinanceiro = receitaFin - despFin;
  const outrasReceitas = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='credito'), idsPorGrupo('outras_receitas')));
  const outrasDespesas = Math.abs(somaCategoria(txs.filter(t=>t.tipo==='debito'), idsPorGrupo('outras_despesas')));
  const resultadoLiquido = resultadoOperacional + resultadoFinanceiro + outrasReceitas - outrasDespesas;
  return {receitaBruta,deducoes,receitaLiquida,custoServicos,lucroBruto,despPessoal,despAdmin,despComercial,despOperacionais,resultadoOperacional,receitaFin,despFin,resultadoFinanceiro,outrasReceitas,outrasDespesas,resultadoLiquido};
}
function totalReceitasDespesasGeral(){
  let receitas=0, despesas=0;
  state.transacoes.forEach(t=>{
    const cat = categoriasAtuais().find(c=>c.id===t.categoria);
    if(!cat || cat.grupo==='neutro') return;
    if(t.tipo==='credito') receitas += t.valor; else despesas += t.valor;
  });
  return {receitas, despesas};
}

        <td><select data-ofx-cat="${i}">${categoriasAtuais().map(c=>`<option value="${c.id}" ${p.categoria===c.id?'selected':''}>${c.label}</option>`).join('')}</select></td>
      </tr>`).join('')}
    </tbody></table>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <button class="btn btn-primary" id="confirmarImportOfx">Importar ${selecionados} lançamentos</button>
      <button class="btn" id="cancelarImportOfx">Cancelar</button>
    </div>
  </div>`;

function parseOFX(texto){
  const blocos = texto.match(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi) || texto.split(/<STMTTRN>/i).slice(1).map(b=>b.split(/<\/STMTTRN>/i)[0]);
  const pegar = (bloco, tag) => {
    const m = bloco.match(new RegExp('<'+tag+'>\\s*([^<\\r\\n]*)', 'i'));
    return m ? m[1].trim() : '';
  };
  const resultado = [];
  blocos.forEach(blocoBruto=>{
    const bloco = blocoBruto.replace(/<STMTTRN>/i,'').replace(/<\/STMTTRN>/i,'');
    const dtRaw = pegar(bloco, 'DTPOSTED');
    const valorRaw = pegar(bloco, 'TRNAMT');
    const memo = pegar(bloco, 'MEMO') || pegar(bloco, 'NAME') || 'Lançamento importado';
    if(!dtRaw || !valorRaw) return;
    const ano = dtRaw.slice(0,4), mes = dtRaw.slice(4,6), dia = dtRaw.slice(6,8);
    const data = `${ano}-${mes}-${dia}`;
    const valorNum = parseFloat(valorRaw.replace(',','.'));
    if(isNaN(valorNum) || !ano || !mes || !dia) return;
    const tipo = valorNum >= 0 ? 'credito' : 'debito';
    resultado.push({
      selecionado:true, data, descricao: memo,
      valor: Math.abs(valorNum), tipo,
      categoria: tipo==='credito' ? 'receita_servicos' : 'desp_admin'
    });
  });
  return resultado;
}

  if(st==='pago') return {c:'green', l:'Pago'};

/* ---------------- BALANCETE ---------------- */
function calcularBalancete(){
  const totalCaixa = state.contas.reduce((s,c)=> s + saldoConta(c.id), 0);
  const {receitas, despesas} = totalReceitasDespesasGeral();
  const grupos = ['Ativo','Passivo','Patrimônio Líquido','Resultado'];
  let totalD=0, totalC=0;
  const contasAutoBanco = state.plano.filter(p=>p.auto==='caixa'||p.auto==='bancos');
  const linhasCalc = state.plano.map(p=>{
    let saldo;
    if(p.auto==='caixa'||p.auto==='bancos'){
      saldo = contasAutoBanco[0] && contasAutoBanco[0].id===p.id ? totalCaixa : 0;
    } else if(p.auto==='receitas'){
      saldo = receitas;
    } else if(p.auto==='despesas'){
      saldo = despesas;
    } else {
      saldo = p.saldoManual||0;
    }
    const devedor = p.natureza==='D'? saldo : 0;
    const credor = p.natureza==='C'? saldo : 0;
    totalD += devedor; totalC += credor;
    return {...p, devedor, credor};
  });
  return { grupos, linhasCalc, totalD, totalC, diff: totalD-totalC };
}
function renderBalancete(){
  const {grupos, linhasCalc, totalD, totalC, diff} = calcularBalancete();
  const edit = estadoEdicao.plano ? state.plano.find(p=>p.id===estadoEdicao.plano) : null;
  return `

      <div class="field"><label>Natureza</label><select id="bcNatureza"><option value="D" ${edit&&edit.natureza==='D'?'selected':''}>Devedora</option><option value="C" ${edit&&edit.natureza==='C'?'selected':''}>Credora</option></select></div>

    </div>

  </div>
  ${grupos.map(g=>{
    const rows = linhasCalc.filter(l=>l.grupo===g);
    if(rows.length===0) return '';
    return `<div class="card">
      <div class="card-head"><h2>${g}</h2></div>
      <table><thead><tr><th>Conta</th><th class="num">Devedor</th><th class="num">Credor</th><th></th></tr></thead>

function attachHandlers(){
  document.querySelectorAll('.menu-acoes').forEach(det=>{
    det.addEventListener('toggle', ()=>{
      if(!det.open) return;
      document.querySelectorAll('.menu-acoes[open]').forEach(o=>{ if(o!==det) o.open=false; });
      const lista = det.querySelector('.menu-lista');
      if(!lista) return;
      const rect = det.getBoundingClientRect();
      const espacoAbaixo = window.innerHeight - rect.bottom;
      lista.style.position = 'fixed';
      lista.style.right = (window.innerWidth - rect.right) + 'px';
      lista.style.left = 'auto';
      if(espacoAbaixo < 230){
        lista.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
        lista.style.top = 'auto';
      } else {
        lista.style.top = (rect.bottom + 4) + 'px';
        lista.style.bottom = 'auto';
      }
    });
  });


  const cartaoContaSel = document.getElementById('cartaoConta');
  if(cartaoContaSel) cartaoContaSel.onchange = ()=>{ cartaoSel = cartaoContaSel.value; estadoEdicao.cartaoLanc=null; render(); };
  const addCartao = document.getElementById('addCartao');
  if(addCartao){
    addCartao.onclick = ()=>{
      const nome = document.getElementById('ccNome').value.trim();
      if(!nome){ return; }
      const dados = {
        nome,
        bandeira: document.getElementById('ccBandeira').value.trim(),
        limite: parseFloat(document.getElementById('ccLimite').value)||0,
        diaFechamento: parseInt(document.getElementById('ccFechamento').value)||null,
        diaVencimento: parseInt(document.getElementById('ccVencimento').value)||null
      };
      if(estadoEdicao.cartao){
        const item = state.cartoes.find(c=>c.id===estadoEdicao.cartao);
        if(item) Object.assign(item, dados);
        estadoEdicao.cartao = null;
      } else {
        const novo = { id: uid(), ...dados };
        state.cartoes.push(novo);
        cartaoSel = novo.id;
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-cartao]').forEach(b=> b.onclick = ()=>{ estadoEdicao.cartao=b.dataset.editarCartao; render(); });
  const cancelarEdicaoCartao = document.getElementById('cancelarEdicaoCartao');
  if(cancelarEdicaoCartao) cancelarEdicaoCartao.onclick = ()=>{ estadoEdicao.cartao=null; render(); };
  document.querySelectorAll('[data-del-cartao]').forEach(b=> b.onclick = ()=>{
    if(!confirm('Excluir este cartão e todos os lançamentos dele?')) return;
    const id = b.dataset.delCartao;
    state.cartoes = state.cartoes.filter(c=>c.id!==id);
    state.cartaoLancamentos = state.cartaoLancamentos.filter(l=>l.cartaoId!==id);
    cartaoSel = null;
    render(); saveState();
  });

  const addLancCartao = document.getElementById('addLancCartao');
  if(addLancCartao){
    addLancCartao.onclick = ()=>{
      const descricao = document.getElementById('ccLancDesc').value.trim();
      const valor = parseFloat(document.getElementById('ccLancValor').value);
      if(!descricao || !valor || !cartaoSel){ return; }
      const dados = {
        data: document.getElementById('ccLancData').value || todayISO(),
        descricao, valor: Math.abs(valor),
        categoria: document.getElementById('ccLancCategoria').value
      };
      if(estadoEdicao.cartaoLanc){
        const item = state.cartaoLancamentos.find(l=>l.id===estadoEdicao.cartaoLanc);
        if(item) Object.assign(item, dados);
        estadoEdicao.cartaoLanc = null;
      } else {
        state.cartaoLancamentos.push({ id: uid(), cartaoId: cartaoSel, fechado:false, ...dados });
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-lanc-cartao]').forEach(b=> b.onclick = ()=>{ estadoEdicao.cartaoLanc=b.dataset.editarLancCartao; render(); });
  const cancelarEdicaoLancCartao = document.getElementById('cancelarEdicaoLancCartao');
  if(cancelarEdicaoLancCartao) cancelarEdicaoLancCartao.onclick = ()=>{ estadoEdicao.cartaoLanc=null; render(); };
  document.querySelectorAll('[data-del-lanc-cartao]').forEach(b=> b.onclick = ()=>{
    state.cartaoLancamentos = state.cartaoLancamentos.filter(l=>l.id!==b.dataset.delLancCartao);
    render(); saveState();
  });
  const fecharFaturaCartao = document.getElementById('fecharFaturaCartao');
  if(fecharFaturaCartao){
    fecharFaturaCartao.onclick = ()=>{
      const contaId = document.getElementById('ccContaPagamento').value;
      const cartao = state.cartoes.find(c=>c.id===cartaoSel);
      const abertos = state.cartaoLancamentos.filter(l=>l.cartaoId===cartaoSel && !l.fechado);
      const total = abertos.reduce((s,l)=> s+l.valor, 0);
      if(!contaId || total<=0) return;
      if(!confirm(`Fechar a fatura de ${fmtMoney(total)} e lançar como pagamento na conta selecionada?`)) return;
      abertos.forEach(l=> l.fechado = true);
      state.transacoes.push({
        id: uid(), contaId,
        data: todayISO(),
        descricao: 'Pagamento fatura cartão — ' + (cartao? cartao.nome : ''),
        tipo: 'debito', valor: total, categoria: 'desp_admin'
      });
      render(); saveState();
    };
  }

  const addEmprestimo = document.getElementById('addEmprestimo');
  if(addEmprestimo){
    addEmprestimo.onclick = ()=>{
      const contraparte = document.getElementById('emContraparte').value.trim();
      const valor = parseFloat(document.getElementById('emValor').value);
      const parcelas = parseInt(document.getElementById('emParcelas').value);
      if(!contraparte || !valor || !parcelas){ alert('Preencha contraparte, valor e número de parcelas.'); return; }
      const dados = {
        tipo: document.getElementById('emTipo').value,
        contraparte, valor: Math.abs(valor), parcelas,
        data: document.getElementById('emData').value || todayISO(),
        taxaJuros: document.getElementById('emTaxa').value.trim()

      const reader = new FileReader();

    if(!confirm('Excluir esta conta e todos os lançamentos vinculados a ela?')) return;
    const id = b.dataset.delConta;
    state.contas = state.contas.filter(c=>c.id!==id);
    state.transacoes = state.transacoes.filter(t=>t.contaId!==id);
    render(); saveState();
  });

  const extratoConta = document.getElementById('extratoConta');
  if(extratoConta) extratoConta.onchange = ()=>{ extratoContaSel = extratoConta.value; ofxPreview = null; estadoEdicao.tx = null; mostrarCorrecaoSaldo=false; render(); };
  const toggleCorrecaoSaldo = document.getElementById('toggleCorrecaoSaldo');
  if(toggleCorrecaoSaldo) toggleCorrecaoSaldo.onclick = ()=>{ mostrarCorrecaoSaldo = !mostrarCorrecaoSaldo; render(); };
  const excluirExtratoCompleto = document.getElementById('excluirExtratoCompleto');
  if(excluirExtratoCompleto){
    excluirExtratoCompleto.onclick = ()=>{
      const conta = state.contas.find(c=>c.id===extratoContaSel);
      const qtd = state.transacoes.filter(t=>t.contaId===extratoContaSel).length;
      if(qtd===0){ alert('Esta conta já não tem nenhum lançamento.'); return; }
      if(!confirm(`Isso vai excluir TODOS os ${qtd} lançamentos da conta "${conta? conta.nome:''}". Essa ação não pode ser desfeita. Deseja continuar?`)) return;
      if(!confirm('Tem certeza mesmo? Todos os lançamentos dessa conta serão apagados permanentemente.')) return;
      state.transacoes = state.transacoes.filter(t=>t.contaId!==extratoContaSel);
      render(); saveState();
    };
  }
  const confirmarCorrecaoSaldo = document.getElementById('confirmarCorrecaoSaldo');
  if(confirmarCorrecaoSaldo){
    confirmarCorrecaoSaldo.onclick = ()=>{
      const novoSaldo = parseFloat(document.getElementById('saldoCorrigidoInput').value);
      if(isNaN(novoSaldo)){ return; }
      const atual = saldoConta(extratoContaSel);
      const diferenca = novoSaldo - atual;
      if(Math.abs(diferenca) < 0.005){ mostrarCorrecaoSaldo = false; render(); return; }
      state.transacoes.push({
        id: uid(), contaId: extratoContaSel,
        data: todayISO(),
        descricao: 'Correção de saldo',
        tipo: diferenca > 0 ? 'credito' : 'debito',
        valor: Math.abs(diferenca),
        categoria: 'ajuste_saldo'
      });
      mostrarCorrecaoSaldo = false;
      render(); saveState();
    };
  }

  const addTx = document.getElementById('addTx');
  if(addTx){
    addTx.onclick = async ()=>{
      const desc = document.getElementById('txDesc').value.trim();
      const valor = parseFloat(document.getElementById('txValor').value);
      if(!desc || !valor){ return; }
      const dados = {
        data: document.getElementById('txData').value || todayISO(),
        descricao: desc,
        tipo: document.getElementById('txTipo').value,
        valor: Math.abs(valor),
        categoria: document.getElementById('txCategoria').value
      };
      if(estadoEdicao.tx){
        const item = state.transacoes.find(t=>t.id===estadoEdicao.tx);
        if(item) Object.assign(item, dados);
        estadoEdicao.tx = null;
      } else {
        state.transacoes.push({ id: uid(), contaId: extratoContaSel, ...dados });
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-tx]').forEach(b=> b.onclick = ()=>{
    estadoEdicao.tx = b.dataset.editarTx; render();
  });
  const cancelarEdicaoTx = document.getElementById('cancelarEdicaoTx');
  if(cancelarEdicaoTx) cancelarEdicaoTx.onclick = ()=>{ estadoEdicao.tx=null; render(); };
  document.querySelectorAll('[data-estornar-tx]').forEach(b=> b.onclick = ()=>{
    const original = state.transacoes.find(t=>t.id===b.dataset.estornarTx);
    if(!original) return;
    if(!confirm(`Estornar "${original.descricao}" (${fmtMoney(original.valor)})? Isso cria um lançamento de estorno hoje, sem apagar o lançamento original.`)) return;
    original.estornado = true;
    state.transacoes.push({
      id: uid(), contaId: original.contaId,
      data: todayISO(),
      descricao: 'Estorno: ' + original.descricao,
      tipo: original.tipo==='credito' ? 'debito' : 'credito',
      valor: original.valor,
      categoria: original.categoria,
      estornoDe: original.id
    });
    render(); saveState();
  });
  document.querySelectorAll('[data-del-tx]').forEach(b=> b.onclick = async ()=>{
    if(!confirm('Excluir remove o lançamento por completo, inclusive do histórico da DRE daquele mês. Para desfazer um pagamento sem alterar meses passados, prefira "Estornar". Deseja mesmo excluir?')) return;
    state.transacoes = state.transacoes.filter(t=>t.id!==b.dataset.delTx);
    render(); saveState();
  });

  const ofxInput = document.getElementById('ofxInput');
  if(ofxInput){
    ofxInput.onchange = ()=>{
      const file = ofxInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e)=>{
        ofxPreview = parseOFX(e.target.result);
        render();
      };
      reader.readAsText(file);
    };
  }
  document.querySelectorAll('[data-ofx-check]').forEach(chk=> chk.onchange = ()=>{
    ofxPreview[parseInt(chk.dataset.ofxCheck)].selecionado = chk.checked;
  });
  document.querySelectorAll('[data-ofx-cat]').forEach(sel=> sel.onchange = ()=>{
    ofxPreview[parseInt(sel.dataset.ofxCat)].categoria = sel.value;
  });
  const confirmarImportOfx = document.getElementById('confirmarImportOfx');
  if(confirmarImportOfx){
    confirmarImportOfx.onclick = async ()=>{
      const selecionados = ofxPreview.filter(p=>p.selecionado);
      selecionados.forEach(p=>{
        state.transacoes.push({
          id: uid(), contaId: extratoContaSel,
          data: p.data, descricao: p.descricao, tipo: p.tipo, valor: p.valor, categoria: p.categoria
        });
      });
      ofxPreview = null;
      render(); saveState();
    };
  }
  const cancelarImportOfx = document.getElementById('cancelarImportOfx');
  if(cancelarImportOfx) cancelarImportOfx.onclick = ()=>{ ofxPreview = null; render(); };

  const addNota = document.getElementById('addNota');
  if(addNota){
    addNota.onclick = async ()=>{
      const numero = document.getElementById('nfNumero').value.trim();
      const parteRef = document.getElementById('nfParte').value;
      const parteManual = document.getElementById('nfParteManual').value.trim();
      const valor = parseFloat(document.getElementById('nfValor').value);
      if(!numero || !valor || !parteRef || (parteRef==='avulso' && !parteManual)){
        alert('Preencha número, valor e o contato (ou digite o nome em "Outro").'); return;
      }
      let parte = parteManual;
      if(parteRef!=='avulso'){
        const c = listaContatosCobranca().find(c=>c.ref===parteRef);
        parte = c ? c.nome : parteManual;
      }
      const dados = {
        numero, parte, parteRef,
        tipo: document.getElementById('nfTipo').value,
        data: document.getElementById('nfData').value || todayISO(),
        valor: Math.abs(valor),
        status: document.getElementById('nfStatus').value,
        obs: document.getElementById('nfObs').value.trim()
      };
      if(estadoEdicao.nota){
        const item = state.notas.find(n=>n.id===estadoEdicao.nota);
        if(item) Object.assign(item, dados);
        estadoEdicao.nota = null;
      } else {
        state.notas.push({ id: uid(), ...dados });
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-nota]').forEach(b=> b.onclick = ()=>{
    estadoEdicao.nota = b.dataset.editarNota; render();
  });
  const cancelarEdicaoNota = document.getElementById('cancelarEdicaoNota');
  if(cancelarEdicaoNota) cancelarEdicaoNota.onclick = ()=>{ estadoEdicao.nota=null; render(); };
  document.querySelectorAll('[data-toggle-pago-nota]').forEach(b=> b.onclick = async ()=>{
    const n = state.notas.find(n=>n.id===b.dataset.togglePagoNota);
    if(n){ n.status = n.status==='paga' ? 'pendente' : 'paga'; render(); saveState(); }
  });
  document.querySelectorAll('[data-del-nota]').forEach(b=> b.onclick = async ()=>{
    const n = state.notas.find(n=>n.id===b.dataset.delNota);
    let msg = 'Excluir esta nota fiscal?';
    if(n && n.lancamentoId){
      const lista = n.lancamentoTipo==='receber' ? state.contasReceber : state.contasPagar;
      const item = lista.find(i=>i.id===n.lancamentoId);
      if(item && item.status==='pago'){
        msg = 'Esta nota já foi lançada e paga em Contas a '+(n.lancamentoTipo==='receber'?'receber':'pagar')+'. Excluir a nota vai remover esse lançamento, mas o dinheiro que já entrou/saiu no extrato bancário permanece lá — se precisar, desfaça esse pagamento manualmente antes (estornando) para manter tudo coerente. Deseja continuar mesmo assim?';
      } else {
        msg = 'Excluir esta nota fiscal? O lançamento correspondente em Contas a '+(n.lancamentoTipo==='receber'?'receber':'pagar')+' também será removido.';
      }
    }
    if(!confirm(msg)) return;
    if(n && n.lancamentoId){
      if(n.lancamentoTipo==='receber') state.contasReceber = state.contasReceber.filter(i=>i.id!==n.lancamentoId);
      else state.contasPagar = state.contasPagar.filter(i=>i.id!==n.lancamentoId);
    }
    state.notas = state.notas.filter(n=>n.id!==b.dataset.delNota);
    render(); saveState();
  });
  document.querySelectorAll('[data-nota-lancar]').forEach(b=> b.onclick = ()=>{
    const [notaId, tipo] = b.dataset.notaLancar.split(':');
    const n = state.notas.find(n=>n.id===notaId);
    if(!n || n.lancamentoId) return;
    const lancId = uid();
    const item = {
      id: lancId,
      descricao: 'Nota fiscal nº '+n.numero+' — '+n.parte,
      parte: n.parte,
      valor: n.valor,
      vencimento: n.data,
      categoria: tipo==='receber' ? 'receita_servicos' : 'desp_admin',
      status: 'pendente'
    };
    if(tipo==='receber') state.contasReceber.push(item);
    else state.contasPagar.push(item);
    n.lancamentoId = lancId;
    n.lancamentoTipo = tipo;
    render(); saveState();
  });
  document.querySelectorAll('[data-ver-nota]').forEach(b=> b.onclick = ()=>{
    notaVisualizada = state.notas.find(n=>n.id===b.dataset.verNota);
    render();
  });
  const fecharNotaCompleta = document.getElementById('fecharNotaCompleta');
  if(fecharNotaCompleta) fecharNotaCompleta.onclick = ()=>{ notaVisualizada=null; render(); };

  document.querySelectorAll('[data-add-conta]').forEach(btn=> btn.onclick = async ()=>{
    const tipo = btn.dataset.addConta;
    const p = tipo==='pagar'? 'pg' : 'rc';
    const desc = document.getElementById(p+'Desc').value.trim();
    const valor = parseFloat(document.getElementById(p+'Valor').value);
    const parteRef = document.getElementById(p+'Parte').value;
    const parteManual = document.getElementById(p+'ParteManual').value.trim();
    if(!desc || !valor || !parteRef || (parteRef==='avulso' && !parteManual)){
      alert('Preencha descrição, valor e o contato (ou digite o nome em "Outro").'); return;
    }
    let parteNome = parteManual;
    if(parteRef!=='avulso'){
      const c = listaContatosCobranca().find(c=>c.ref===parteRef);
      parteNome = c ? c.nome : parteManual;
    }
    const dados = {
      descricao: desc,
      parte: parteNome,
      parteRef,
      valor: Math.abs(valor),
      vencimento: document.getElementById(p+'Venc').value || todayISO(),
      categoria: document.getElementById(p+'Cat').value
    };
    const edId = tipo==='pagar' ? estadoEdicao.pagar : estadoEdicao.receber;
    if(edId){
      const lista = tipo==='pagar'? state.contasPagar : state.contasReceber;
      const item = lista.find(i=>i.id===edId);
      if(item) Object.assign(item, dados);
      if(tipo==='pagar') estadoEdicao.pagar=null; else estadoEdicao.receber=null;
    } else {
      const item = { id: uid(), status:'pendente', ...dados };
      if(tipo==='pagar') state.contasPagar.push(item); else state.contasReceber.push(item);
    }
    render(); saveState();
  });
  document.querySelectorAll('[data-editar-conta-mov]').forEach(btn=> btn.onclick = ()=>{
    const [tipo, id] = btn.dataset.editarContaMov.split(':');
    if(tipo==='pagar') estadoEdicao.pagar = id; else estadoEdicao.receber = id;
    render();
  });
  document.querySelectorAll('[data-cancelar-edicao-conta]').forEach(btn=> btn.onclick = ()=>{
    const tipo = btn.dataset.cancelarEdicaoConta;
    if(tipo==='pagar') estadoEdicao.pagar=null; else estadoEdicao.receber=null;
    render();
  });

  document.querySelectorAll('[data-pay-conta]').forEach(btn=> btn.onclick = async ()=>{
    const [tipo, id] = btn.dataset.payConta.split(':');
    const lista = tipo==='pagar'? state.contasPagar : state.contasReceber;
    const item = lista.find(i=>i.id===id);
    if(!item) return;
    if(item.status==='pago'){
      if(!confirm('Isso vai estornar o lançamento criado no extrato bancário (sem apagar o histórico) e marcar como pendente novamente. Continuar?')) return;
      const original = item.transacaoId ? state.transacoes.find(t=>t.id===item.transacaoId) : null;
      if(original && !original.estornado){
        original.estornado = true;
        state.transacoes.push({
          id: uid(), contaId: original.contaId,
          data: todayISO(),
          descricao: 'Estorno: ' + original.descricao,
          tipo: original.tipo==='credito' ? 'debito' : 'credito',
          valor: original.valor,
          categoria: original.categoria,
          estornoDe: original.id
        });
      }
      item.status = 'pendente';
      item.contaId = null;
      item.dataPagamento = null;
      item.transacaoId = null;
      render(); saveState();
      return;
    }
    const sel = document.querySelector(`[data-conta-select="${tipo}:${id}"]`);
    const contaId = sel ? sel.value : (state.contas[0] && state.contas[0].id);
    if(!contaId) return;
    item.status = 'pago';
    item.contaId = contaId;
    item.dataPagamento = todayISO();
    const novaTxId = uid();
    item.transacaoId = novaTxId;
    state.transacoes.push({
      id: novaTxId, contaId,
      data: todayISO(),
      descricao: (tipo==='pagar'? 'Pagamento: ' : 'Recebimento: ') + item.descricao + (item.parte? ' — '+item.parte : ''),
      tipo: tipo==='pagar'? 'debito' : 'credito',
      valor: item.valor,
      categoria: item.categoria
    });
    render(); saveState();
  });

  document.querySelectorAll('[data-del-conta-mov]').forEach(btn=> btn.onclick = async ()=>{
    const [tipo, id] = btn.dataset.delContaMov.split(':');
    if(tipo==='pagar') state.contasPagar = state.contasPagar.filter(i=>i.id!==id);
    else state.contasReceber = state.contasReceber.filter(i=>i.id!==id);
    render(); saveState();
  });

  const addCliente = document.getElementById('addCliente');
  if(addCliente){
    addCliente.onclick = async ()=>{
      const nome = document.getElementById('clNome').value.trim();
      if(!nome){ document.getElementById('clNome').focus(); return; }
      const dados = {
        nome,
        contato: document.getElementById('clContato').value.trim(),
        email: document.getElementById('clEmail').value.trim(),
        tipo: document.getElementById('clTipo').value.trim(),
        contrato: document.getElementById('clContrato').value.trim(),
        cota: document.getElementById('clCota').value.trim(),
        admin: document.getElementById('clAdmin').value.trim(),
        valor: parseFloat(document.getElementById('clValor').value)||0,
        status: document.getElementById('clStatus').value,
        data: document.getElementById('clData').value || todayISO(),
        obs: document.getElementById('clObs').value.trim()
      };
      if(estadoEdicao.cliente){
        const item = state.clientes.find(c=>c.id===estadoEdicao.cliente);
        if(item) Object.assign(item, dados);
        estadoEdicao.cliente = null;
      } else {
        state.clientes.push({ id: uid(), ...dados });
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-cliente]').forEach(b=> b.onclick = ()=>{
    estadoEdicao.cliente = b.dataset.editarCliente; render();
  });
  const cancelarEdicaoCliente = document.getElementById('cancelarEdicaoCliente');
  if(cancelarEdicaoCliente) cancelarEdicaoCliente.onclick = ()=>{ estadoEdicao.cliente=null; render(); };
  const clienteFiltroSel = document.getElementById('clienteFiltro');
  if(clienteFiltroSel) clienteFiltroSel.onchange = ()=>{ clienteFiltro = clienteFiltroSel.value; render(); };
  document.querySelectorAll('[data-status-cliente]').forEach(sel=> sel.onchange = async ()=>{
    const c = state.clientes.find(c=>c.id===sel.dataset.statusCliente);
    if(c){ c.status = sel.value; render(); saveState(); }
  });
  document.querySelectorAll('[data-del-cliente]').forEach(b=> b.onclick = async ()=>{
    if(!confirm('Excluir este consorciado?')) return;
    state.clientes = state.clientes.filter(c=>c.id!==b.dataset.delCliente);
    render(); saveState();
  });

  const dreMesSel = document.getElementById('dreMes');
  const dreAnoSel = document.getElementById('dreAno');
  if(dreMesSel) dreMesSel.onchange = ()=>{ dreMes = parseInt(dreMesSel.value); render(); };
  if(dreAnoSel) dreAnoSel.onchange = ()=>{ dreAno = parseInt(dreAnoSel.value); render(); };
  const imprimirDreBtn = document.getElementById('imprimirDre');
  if(imprimirDreBtn) imprimirDreBtn.onclick = ()=> imprimirDRE(dreMes, dreAno);
  const imprimirBalanceteBtn = document.getElementById('imprimirBalancete');
  if(imprimirBalanceteBtn) imprimirBalanceteBtn.onclick = ()=> imprimirBalancete();

  const addPlano = document.getElementById('addPlano');
  if(addPlano){
    addPlano.onclick = async ()=>{
      const conta = document.getElementById('bcConta').value.trim();
      if(!conta){ return; }
      const dados = {
        grupo: document.getElementById('bcGrupo').value,
        conta,
        natureza: document.getElementById('bcNatureza').value,
        saldoManual: parseFloat(document.getElementById('bcSaldo').value)||0
      };
      if(estadoEdicao.plano){
        const item = state.plano.find(p=>p.id===estadoEdicao.plano);
        if(item) Object.assign(item, dados);
        estadoEdicao.plano = null;
      } else {
        state.plano.push({ id: uid(), ...dados });
      }
      render(); saveState();
    };
  }
  document.querySelectorAll('[data-editar-plano]').forEach(b=> b.onclick = ()=>{
    estadoEdicao.plano = b.dataset.editarPlano; render();
  });
  const cancelarEdicaoPlano = document.getElementById('cancelarEdicaoPlano');
  if(cancelarEdicaoPlano) cancelarEdicaoPlano.onclick = ()=>{ estadoEdicao.plano=null; render(); };
  document.querySelectorAll('[data-del-plano]').forEach(b=> b.onclick = async ()=>{
    state.plano = state.plano.filter(p=>p.id!==b.dataset.delPlano);
    render(); saveState();
  });
}

/* ---------------- Autenticação (via servidor) ----------------
   O login agora é validado no servidor, com a senha guardada de forma
   protegida (hash) no banco de dados — não mais no navegador. */
async function statusAuth(){
  try{
    const r = await fetch('/api/auth/status', {credentials:'same-origin'});
    return await r.json();
  }catch(e){
    return { existeUsuario:false, logado:false, erro:true };
  }
}
async function criarPrimeiroUsuario(usuario, senha){
  const r = await fetch('/api/auth/setup', {
    method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
    body: JSON.stringify({usuario, senha})
  });
  return r.ok;
}
async function fazerLogin(usuario, senha){
  const r = await fetch('/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
    body: JSON.stringify({usuario, senha})
  });
  return r.ok;
}
async function fazerLogout(){
  await fetch('/api/auth/logout', {method:'POST', credentials:'same-origin'});
  location.reload();
}
function mostrarApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'flex';
}
function mostrarLogin(primeiroAcesso){
  const dica = document.getElementById('loginPrimeiroAcesso');
  const label = document.getElementById('loginTituloAcao');
  const btn = document.getElementById('loginBtn');
  if(primeiroAcesso){
    dica.textContent = 'Primeiro acesso: crie o usuário e a senha que serão usados para entrar no sistema.';
    label.textContent = 'Criar conta de acesso';
    btn.textContent = 'Criar e entrar';
  } else {
    dica.textContent = '';
    label.textContent = 'Entre para acessar o ERP';
    btn.textContent = 'Entrar';
  }
  document.getElementById('loginScreen').dataset.modo = primeiroAcesso ? 'setup' : 'login';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appRoot').style.display = 'none';
}
function renderAcesso(){
  return `
  <div class="card">
    <div class="card-head"><h2>Usuário e senha de acesso</h2></div>
    <div class="hint" style="margin-bottom:14px;">Essa senha protege a entrada neste ERP. Ela fica guardada de forma protegida no servidor — se trocar, use a nova senha no próximo login.</div>
    <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr auto;">
      <div class="field"><label>Usuário atual</label><input id="acUsuario" placeholder="Confirme o usuário atual"></div>
      <div class="field"><label>Nova senha</label><input type="password" id="acSenha" placeholder="Digite a nova senha"></div>
      <div class="field"><label>Confirmar nova senha</label><input type="password" id="acSenha2" placeholder="Repita a nova senha"></div>
      <button class="btn btn-primary" id="salvarAcesso">Salvar</button>
    </div>
    <div id="acessoMsg" style="font-size:12px; margin-top:10px;"></div>
  </div>`;
}

function renderBackup(){
  const totalRegistros = state.contas.length + state.transacoes.length + state.notas.length
    + state.clientes.length + state.contasPagar.length + state.contasReceber.length + state.fornecedores.length;
  return `
  <div class="card">
    <div class="card-head"><h2>Sobre o armazenamento</h2></div>
    <div class="hint" style="font-size:13px; line-height:1.6;">
      Agora seus dados ficam guardados em um banco de dados no servidor — não dependem mais deste navegador ou deste computador, e continuam intactos quando eu atualizar o sistema. Ainda assim, é uma boa prática exportar um backup de vez em quando, como uma cópia de segurança extra.
    </div>
  </div>
  <div class="card">
    <div class="card-head"><h2>Exportar backup</h2></div>
    <div class="hint" style="margin-bottom:12px;">Gera um arquivo .json com todos os dados cadastrados (${totalRegistros} registros ao todo, além das configurações da empresa e do plano de contas).</div>
    <button class="btn btn-primary" id="exportarBackup">Exportar backup (.json)</button>
  </div>
  <div class="card">
    <div class="card-head"><h2>Importar backup</h2></div>
    <div class="hint" style="margin-bottom:12px;">Selecione um arquivo .json exportado anteriormente. Isso <b>substitui todos os dados atuais</b> deste ERP pelos dados do backup.</div>
    <input type="file" id="importarBackupInput" accept="application/json,.json">
    <div id="importarMsg" style="font-size:12px; margin-top:10px;"></div>
  </div>`;
}

/* ---------------- Init ---------------- */
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.menu-acoes')) document.querySelectorAll('.menu-acoes[open]').forEach(d=> d.open=false);
});
async function iniciarApp(){
  document.getElementById('view').innerHTML = '<div class="card"><div class="empty">Carregando seus dados...</div></div>';
  await loadState();
  setTab('dashboard');
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>{ if(confirm('Sair do sistema?')) fazerLogout(); };
}

document.getElementById('loginBtn').onclick = async ()=>{
  const usuario = document.getElementById('loginUsuario').value.trim();
  const senha = document.getElementById('loginSenha').value;
  const erro = document.getElementById('loginErro');
  const modo = document.getElementById('loginScreen').dataset.modo;
  if(!usuario || !senha){ erro.textContent = 'Preencha usuário e senha.'; return; }
  let ok;
  if(modo==='setup'){
    if(senha.length<4){ erro.textContent = 'A senha precisa ter pelo menos 4 caracteres.'; return; }
    ok = await criarPrimeiroUsuario(usuario, senha);
  } else {
    ok = await fazerLogin(usuario, senha);
  }
  if(ok){
    erro.textContent = '';
    mostrarApp();
    iniciarApp();
  } else {
    erro.textContent = modo==='setup' ? 'Não foi possível criar o acesso.' : 'Usuário ou senha incorretos.';
  }
};
document.getElementById('loginSenha').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
document.getElementById('loginUsuario').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginSenha').focus(); });

(async function initAuthScreen(){
  const status = await statusAuth();
  if(status.logado){
    mostrarApp();
    iniciarApp();
  } else if(!status.existeUsuario){
    mostrarLogin(true);
  } else {
    mostrarLogin(false);
  }
})();
</script>
</body>
</html>
